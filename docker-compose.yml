version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: microblog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/microblog
      # Не устанавливаем TESTING переменную, чтобы таблицы создались
    volumes:
      - ./uploads:/app/uploads
      - ./static:/app/static

volumes:
  postgres_data: