services:
  db:
    image: postgres:15
    container_name: microblog_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    container_name: microblog_web
    command: uvicorn app:app --host 0.0.0.0 --port 5000 --reload
    volumes:
      - .:/app
      - media_volume:/app/media
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  client:
    build: ./client
    container_name: microblog_client
    ports:
      - "80:80"
    volumes:
      - media_volume:/usr/share/nginx/html/media:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  media_volume: